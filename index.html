<!DOCTYPE html>
<html>
<head>
  <title>Eco Phone</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="phone">
  <div class="bg"></div>

  <div class="top-card glass">
    <h1>Rio de Janeiro</h1>
    <p>cidade maravilhosa</p>
  </div>

  <div class="weather glass">
    <h2>28°C ☀️</h2>
    <p>Humidity: 65%</p>
  </div>

  <div class="center-title">rio de janeiro</div>

  <div class="dock glass">
    <button onclick="openApp('travel')">✈️</button>
    <button onclick="openApp('camera')">📷</button>
    <button onclick="openApp('eco')">🍃</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
